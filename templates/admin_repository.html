<link rel="stylesheet" href="/static/style.css">

<div class="admin-container repo-page">

    <div class="admin-card repo-card">

        <!-- HEADER (TITLE + EXPORT BUTTON) -->
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 class="admin-title">Repository</h2>

            <a href="/admin/export">
                <button style="
                    background: gold;
                    border: none;
                    padding: 10px 20px;
                    border-radius: 8px;
                    cursor: pointer;
                    font-weight: bold;
                ">
                    Export CSV
                </button>
            </a>
        </div>

        <!-- TOTAL RECORDS -->
        <div class="repo-count">
            Total Records: {{ data|length }}
        </div>

        <!-- SEARCH -->
        <form method="GET">
            <input class="admin-search"
                   type="text"
                   name="q"
                   value="{{ query }}"
                   placeholder="Search by proverb or keyword...">
        </form>

        <!-- RECORD LIST -->
        <div class="repo-list">

            {% for row in data %}
            <div class="repo-item">

                <div class="repo-serial">#{{ row.id }}</div>

                <p><b>Telugu:</b> {{ row.proverb_telugu }}</p>
                <p><b>English:</b> {{ row.proverb_english }}</p>
                <p><b>Meaning:</b> {{ row.meaning_english }}</p>
                <p><b>Keywords:</b> {{ row.keywords }}</p>

            </div>
            {% endfor %}

        </div>

    </div>

</div>

<a href="/admin" class="admin-back-btn">← Back</a>
